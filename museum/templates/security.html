{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-7xl space-y-6">

  <!-- Current readings -->
  <div class="grid grid-cols-2 gap-4 xl:grid-cols-4">
    <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
      <p class="text-sm font-semibold text-slate-500">Temperature</p>
      <p class="mt-1 text-4xl font-bold text-slate-900"><span id="sec-temp">--</span><span class="text-xl text-slate-400"> °C</span></p>
    </div>
    <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
      <p class="text-sm font-semibold text-slate-500">Humidity</p>
      <p class="mt-1 text-4xl font-bold text-slate-900"><span id="sec-humidity">--</span><span class="text-xl text-slate-400"> %</span></p>
    </div>
    <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
      <p class="text-sm font-semibold text-slate-500">Motion</p>
      <div id="sec-motion" class="mt-3"></div>
    </div>
    <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
      <p class="text-sm font-semibold text-slate-500">Smoke</p>
      <div id="sec-smoke" class="mt-3"></div>
    </div>
  </div>
  <p id="sec-updated" class="-mt-2 text-xs text-slate-400">waiting for data</p>

  <!-- Open alerts -->
  <div class="rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="flex items-center justify-between border-b border-slate-100 px-5 py-4">
        <h2 class="text-lg font-semibold text-slate-900">Alerts</h2>
      <span class="text-xs text-slate-400">motion and smoke trigger the buzzer and an email</span>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-slate-100 text-sm">
        <thead class="bg-slate-50 text-left text-xs font-medium uppercase tracking-wide text-slate-500">
          <tr>
            <th class="px-5 py-3">Type</th>
            <th class="px-5 py-3">Message</th>
            <th class="px-5 py-3">Time</th>
            <th class="px-5 py-3 text-right">Action</th>
          </tr>
        </thead>
        <tbody id="sec-alerts-body" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
  </div>

  <!-- Readings history -->
  <div class="rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="border-b border-slate-100 px-5 py-4">
      <h2 class="text-lg font-semibold text-slate-900">Recent readings</h2>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-slate-100 text-sm">
        <thead class="bg-slate-50 text-left text-xs font-medium uppercase tracking-wide text-slate-500">
          <tr>
            <th class="px-5 py-3">Time</th>
            <th class="px-5 py-3">Temp (°C)</th>
            <th class="px-5 py-3">Humidity (%)</th>
            <th class="px-5 py-3">Motion</th>
            <th class="px-5 py-3">Smoke</th>
          </tr>
        </thead>
        <tbody id="sec-readings-body" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
  </div>

</div>
{% endblock %}
